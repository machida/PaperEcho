name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: Frontend (typecheck · lint · test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test

  python:
    name: Python pipeline (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Sync deps
        working-directory: python
        run: uv sync
      - name: Lint (ruff)
        working-directory: python
        run: uv run ruff check .
      - name: Run tests
        working-directory: python
        run: uv run pytest tests/ -q

  rust:
    name: Tauri backend (cargo test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Tauri's `generate_context!` embeds the built frontend, so `dist/` must
      # exist before the crate compiles — build the web app first.
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Install Tauri system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev \
            libayatana-appindicator3-dev libsoup-3.0-dev \
            build-essential curl wget file libssl-dev libxdo-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Run tests
        working-directory: src-tauri
        run: cargo test --lib
